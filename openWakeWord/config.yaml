# Configuration for using Open Wake Work with Rhasspy voice assistant

# MQTT broker config
# If running Rhasspy in Docker you'll need to run your own MQTT broker
# and set Rhasspy MQTT to `external`.
mqtt:
#  broker: 192.168.0.156
  broker: pi-master.local
  port: 1883
  username: ''
  password: ''

# Open Wake Word config
oww:
  model_names:  # From https://github.com/dscripka/openWakeWord/blob/main/openwakeword/__init__.py
    - alexa
#    - hey_jarvis
#    - /other-models/Hey_CJ.tflite
#    - /other-models/hey_kitt.tflite
#    - /other-models/hey_rick.tflite
#    - /other-models/hey_lisa.tflite
#    - /other-models/wall-e.tflite
#    - /other-models/marvin_v2.tflite
    - /other-models/ok_home.tflite
#    - /other-models/Skynet.tflite
  activation_samples: 3  # Number of samples in moving average
  activation_threshold: 0.2  # Trigger wakeword when average above this threshold
  deactivation_threshold: 0.1  # Do not trigger again until average falls below this threshold
  # OWW config, see https://github.com/dscripka/openWakeWord#recommendations-for-usage
  vad_threshold: 0.3
  enable_speex_noise_suppression: true

# Rhasspy microphone UDP ports, 1 per device/satellite
# https://rhasspy.readthedocs.io/en/latest/tutorials/#udp-audio-streaming
udp_ports:
  floor1: 12202  # Delete or change as needed
  bedroom: 12203  # Delete or change as needed
  office: 12204  # Delete or change as needed
